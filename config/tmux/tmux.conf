# =============================================================================
# CORE SETTINGS
# =============================================================================

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10
set -g history-limit 10000

# =============================================================================
# KEYBINDINGS
# =============================================================================

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind f run-shell "tmux new-window 'sesh connect \$(sesh list -t | fzf --height 40% --reverse --border)'"
bind p display-popup -E "ls ~/Projects | fzf --height 40% --reverse --border | xargs -I{} ~/.config/tmux/open-project.sh ~/Projects/{}"
# =============================================================================
# STATUS BAR
# =============================================================================

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=colour235,fg=default'

set -g status-left "#[fg=colour110,bold] #S  "
set -g status-left-length 40
set -g status-right "#[fg=colour244] #{cpu_percentage} cpu "
set -g status-right-length 40

set -g window-status-format "#[fg=colour244] #W "
set -g window-status-current-format "#[fg=colour255,bold] #W "
set -g window-status-separator ""

set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour110'

# =============================================================================
# PLUGINS
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'

# =============================================================================
# PLUGIN CONFIG
# =============================================================================

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# =============================================================================
# TPM INIT — MUST BE LAST LINE
# =============================================================================

run ~/.tmux/plugins/tmux-cpu/cpu.tmux
run '~/.tmux/plugins/tpm/tpm'

# Keybind cheatsheet
bind ? display-popup -E "echo '
  PANES
  prefix + |       split vertical
  prefix + -       split horizontal
  prefix + x       kill pane
  prefix + hjkl    navigate panes
  prefix + HJKL    resize panes

  WINDOWS
  prefix + c       new window
  prefix + &       kill window
  prefix + ,       rename window
  prefix + 1-9     jump to window

  SESSIONS
  prefix + d       detach
  prefix + \$       rename session
  prefix + f       switch session
  prefix + p       open project

  OTHER
  prefix + r       reload config
  prefix + ?       show this help
' | less"

# AFK — jump to afk window
bind a select-window -t dev:afk
